name = "Jai"
grammar = "jai"                     # If you don't ship a tree-sitter grammar, this is purely nominal.
path_suffixes = ["jai"]
line_comments = ["// "]
autoclose_before = ";:.,=}])>"
brackets = [
    { start = "{",  end = "}",  close = true, newline = true },
    { start = "[",  end = "]",  close = true, newline = true },
    { start = "(",  end = ")",  close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
]
